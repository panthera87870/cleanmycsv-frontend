<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="success_page.meta_title">Paiement Réussi - CleanMyCSV</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700;800&display=swap" rel="stylesheet"></noscript>
</head>
<body>

    <div class="success-page-wrapper">
        <div class="success-card">
            <i class="fa-solid fa-envelope-open-text"></i>
            <h1 data-i18n="success_page.title">Paiement validé ! 🎉</h1>
            <p data-i18n="success_page.desc">
                Votre accès est prêt. Nous venons de vous envoyer un <strong>lien magique</strong> par email. 
                <br><br>
                Cliquez simplement sur le lien dans l'email pour revenir sur le site et nettoyer vos fichiers.
            </p>
            
            <div class="email-provider-links">
                <a href="https://mail.google.com" target="_blank"><i class="fa-brands fa-google"></i> Gmail</a>
                <a href="https://outlook.live.com" target="_blank"><i class="fa-brands fa-microsoft"></i> Outlook</a>
            </div>

            <p class="spam-notice" data-i18n="success_page.spam_notice">
                (N'oubliez pas de vérifier vos courriers indésirables / spams)
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
